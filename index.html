<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuzzy Purple Monster</title>
  <meta name="description" content="A fuzzy purple monster that follows your mouse with its eyes." />
  <link rel="stylesheet" href="./style.scss" />
  <link rel="stylesheet" href="./fonts/Simbiot.css" />
</head>

<body>
  <div id="app">
    <div class="title-container">
      <h1>Ella.Monster</h1>
    </div>
    <div class="monster-container">
      <!-- SVG for the monster head and fuzz -->
      <svg id="monster-svg" viewBox="0 0 400 250" preserveAspectRatio="xMidYMax meet">
        <!-- The head body will be drawn here -->
        <g id="fuzz-layer"></g>
        <path id="monster-body" d="M 50 250 A 150 150 0 0 1 350 250 L 50 250" fill="#8a2be2" />
      </svg>

      <div class="eyes">
        <div class="eye left-eye">
          <div class="pupil"></div>
        </div>
        <div class="eye right-eye">
          <div class="pupil"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
